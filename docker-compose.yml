# =============================================================================
# Hermes Agent + Honcho — Local Development Docker Compose
# =============================================================================
#
# Usage:
#   cp .env.example .env        # edit with your API keys
#   docker compose up -d --build
#
# Services:
#   - hermes     → Web UI (port 3000)
#   - honcho-api → Honcho API server (port 8000)
#   - deriver    → Honcho background worker
#   - postgres   → PostgreSQL with pgvector
#   - redis      → Redis cache
#
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL with pgvector extension
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: honcho-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-honcho}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: honcho-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Honcho API Server
  # --------------------------------------------------------------------------
  honcho-api:
    build:
      context: ./honcho
      dockerfile: Dockerfile
    container_name: honcho-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      HONCHO_MODE: api
      PORT: "8000"
      WORKERS: "1"
      LOG_LEVEL: "info"
      # Database
      DB_CONNECTION_URI: "postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-honcho}"
      # Cache
      CACHE_URL: "redis://redis:6379/0?suppress=true"
      CACHE_ENABLED: "true"
      # Auth (disabled for local dev)
      AUTH_USE_AUTH: "false"
      # LLM Provider
      LLM_OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      LLM_GEMINI_API_KEY: "${GOOGLE_API_KEY:-}"
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Honcho Deriver (Background Worker)
  # --------------------------------------------------------------------------
  deriver:
    build:
      context: ./honcho
      dockerfile: Dockerfile
    container_name: honcho-deriver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      honcho-api:
        condition: service_healthy
    environment:
      HONCHO_MODE: deriver
      # Database
      DB_CONNECTION_URI: "postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-honcho}"
      # Cache
      CACHE_URL: "redis://redis:6379/0?suppress=true"
      CACHE_ENABLED: "true"
      # Auth
      AUTH_USE_AUTH: "false"
      # LLM Provider
      LLM_OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      LLM_GEMINI_API_KEY: "${GOOGLE_API_KEY:-}"
    # The deriver is a background worker — it serves no HTTP, so the API image's
    # `curl /health` healthcheck can never pass. Disable it here.
    healthcheck:
      disable: true
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Hermes Agent — Web UI
  # --------------------------------------------------------------------------
  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    container_name: hermes-agent
    depends_on:
      honcho-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: "3000"
      # Honcho connection (internal Docker network). For a self-hosted Honcho
      # with auth disabled, the base URL alone is enough (no API key needed).
      HONCHO_BASE_URL: "http://honcho-api:8000"
      # Dashboard binds to 0.0.0.0 (reachable from the host), which REQUIRES an
      # auth provider since the June 2026 hardening. Basic auth for local dev:
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: "${HERMES_DASHBOARD_USERNAME:-admin}"
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: "${HERMES_DASHBOARD_PASSWORD:-hermes-local}"
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: "${HERMES_DASHBOARD_SECRET:-local-dev-session-secret-change-me}"
      # LLM Provider
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    healthcheck:
      # /api/status is the auth-exempt liveness probe. Use the venv python
      # (guaranteed present) so we don't depend on curl being in the image.
      test: ["CMD", "/opt/hermes/.venv/bin/python", "-c",
             "import os,urllib.request; urllib.request.urlopen('http://localhost:'+os.environ.get('PORT','3000')+'/api/status').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
